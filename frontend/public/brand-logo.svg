<svg xmlns="http://www.w3.org/2000/svg" width="178" height="52" viewBox="0 0 178 52" fill="none">
  <title>Lume brand logo</title>
  <desc>A transparent Lume wordmark with a radar sweep and light spark mark.</desc>
  <defs>
    <linearGradient id="lume-mark-core" x1="13" y1="12" x2="42" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#14956E"/>
      <stop offset="0.54" stop-color="#5D7D2B"/>
      <stop offset="1" stop-color="#435F1C"/>
    </linearGradient>
    <linearGradient id="lume-sweep" x1="19" y1="38" x2="42" y2="14" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#148EA1"/>
      <stop offset="0.58" stop-color="#5D7D2B"/>
      <stop offset="1" stop-color="#D89614"/>
    </linearGradient>
    <linearGradient id="lume-word" x1="56" y1="11" x2="153" y2="42" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#172033"/>
      <stop offset="1" stop-color="#435F1C"/>
    </linearGradient>
    <filter id="lume-soft-shadow" x="-8" y="-8" width="194" height="68" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="1.4" stdDeviation="1.1" flood-color="#172033" flood-opacity="0.12"/>
    </filter>
  </defs>

  <g filter="url(#lume-soft-shadow)">
    <path
      d="M18.5 38.2V14.8"
      stroke="url(#lume-mark-core)"
      stroke-width="7.6"
      stroke-linecap="round"
    />
    <path
      d="M18.5 38.2H38.3"
      stroke="url(#lume-mark-core)"
      stroke-width="7.6"
      stroke-linecap="round"
    />
    <path
      d="M18.5 38.2C21.2 30.7 27.4 24.8 35.2 22.5"
      stroke="#BCD59C"
      stroke-width="2.4"
      stroke-linecap="round"
      opacity="0.95"
    />
    <path
      d="M18.5 38.2C22.9 26.7 31.6 18.1 42.8 14.9"
      stroke="#148EA1"
      stroke-width="2.4"
      stroke-linecap="round"
      opacity="0.46"
    />
    <path
      d="M18.5 38.2L40 15.9"
      stroke="url(#lume-sweep)"
      stroke-width="3.6"
      stroke-linecap="round"
    />
    <circle cx="41.1" cy="14.7" r="3.9" fill="#D89614"/>
    <path
      d="M41.1 7.5V11.2M41.1 18.2V21.9M33.9 14.7H37.4M44.8 14.7H48.3"
      stroke="#D89614"
      stroke-width="1.7"
      stroke-linecap="round"
      opacity="0.88"
    />
  </g>

  <text
    x="56"
    y="37"
    fill="url(#lume-word)"
    font-family="Outfit, Inter, 'Noto Sans JP', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="33"
    font-weight="900"
    letter-spacing="0"
