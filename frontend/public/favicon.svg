<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <title>Lume favicon</title>
  <desc>Rounded square Lume monogram mark in the product lime green palette.</desc>
  <defs>
    <linearGradient id="lume-tile" x1="10" y1="7" x2="55" y2="58" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF"/>
      <stop offset="1" stop-color="#F4FAEA"/>
    </linearGradient>
    <linearGradient id="lume-monogram" x1="19" y1="20" x2="43" y2="45" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#6F8F2C"/>
      <stop offset="0.56" stop-color="#5D7D2B"/>
      <stop offset="1" stop-color="#8FAE4D"/>
    </linearGradient>
    <filter id="lume-soft-shadow" x="-8" y="-8" width="80" height="80" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="2" stdDeviation="1.5" flood-color="#172033" flood-opacity="0.1"/>
    </filter>
  </defs>

  <rect x="4.5" y="4.5" width="55" height="55" rx="15.5" fill="url(#lume-tile)" stroke="#CFE4A8" filter="url(#lume-soft-shadow)"/>
  <path d="M21 41V22" stroke="url(#lume-monogram)" stroke-width="6" stroke-linecap="round"/>
  <path d="M21 41H31" stroke="url(#lume-monogram)" stroke-width="6" stroke-linecap="round"/>
  <path d="M35.5 30.5V38.6C35.5 41.2 37.2 42.7 39.6 42.7C42.4 42.7 44.1 40.8 44.1 38.1V30.5" stroke="url(#lume-monogram)" stroke-width="5.2" stroke-linecap="round"/>
</svg>
