<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#435f1c"/>
      <stop offset="100%" stop-color="#5d7d2b"/>
    </linearGradient>
    <filter id="backgroundShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0.46" stdDeviation="0.53" flood-color="#000000" flood-opacity="0.106"/>
    </filter>
    <filter id="contentShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0.17" stdDeviation="0.21" flood-color="#000000" flood-opacity="0.091"/>
    </filter>
    <radialGradient id="innerGlow" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.034"/>
      <stop offset="58%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.017"/>
    </radialGradient>
    <linearGradient id="surfaceHighlight" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.106"/>
      <stop offset="52%" stop-color="#ffffff" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000000" stop-opacity="0.034"/>
    </linearGradient>
    <filter id="surfaceNoise" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="0.85" numOctaves="2" seed="7"/>
      <feColorMatrix type="saturate" values="0"/>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7.0" fill="url(#bg)" filter="url(#backgroundShadow)"/>
  <rect width="32" height="32" rx="7.0" fill="url(#innerGlow)"/>
  <rect width="32" height="32" rx="7.0" fill="url(#surfaceHighlight)"/>
  <rect width="32" height="32" rx="7.0" filter="url(#surfaceNoise)" opacity="0.005" style="mix-blend-mode:overlay"/>
  <text x="16" y="16" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="18" font-weight="bold" text-anchor="middle" dominant-baseline="central" fill="#f8fafc" filter="url(#contentShadow)">L</text>
</svg>
